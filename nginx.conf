# Craft CMS URL rewriting rules for the Heroku PHP buildpack (nginx).
# This file is included inside the nginx server {} block via the -C flag in the Procfile.
# It handles Craft's front controller pattern: all requests without a real file
# are routed through index.php.

location / {
    try_files $uri $uri/ @craft;
}

location @craft {
    rewrite ^ /index.php last;
}

# Deny direct access to Craft's private directories.
location ~ /\. {
    deny all;
}
